<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LYCAN — Boutique</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --night:#050810;--deep:#080d1a;--fog:#0b1228;--mist:#111d35;
      --blue-dark:#0d1b3e;--blue-mid:#132044;--blue-glow:#1a3a6e;
      --accent:#4a6fa5;--silver:#a8b8d0;--moon:#d4e0f0;
      --fire:#c0692a;--fire2:#e07b30;--fire3:#f5a623;
      --text:#b8ccdd;--text-dim:#5a7080;
      --error:#e05555;--success:#4aff80;--warn:#f5a623;
      --gold:#f5c842;--rare:#a855f7;--epic:#3b82f6;--legendary:#f59e0b;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--night);color:var(--text);font-family:'Lato',sans-serif;font-weight:300;min-height:100vh;cursor:crosshair;overflow-x:hidden;}

    /* BG */
    .bg-fixed{position:fixed;inset:0;z-index:0;pointer-events:none;}
    .bg-sky{position:absolute;inset:0;background:radial-gradient(ellipse at 30% 0%,#0a1535 0%,#050810 60%);}
    .moon-orb{position:absolute;top:4%;left:10%;width:45px;height:45px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#e8f0ff,#c2d4f0 50%,#8aabcf);box-shadow:0 0 25px rgba(180,210,255,.4),0 0 60px rgba(100,160,255,.2);animation:moonPulse 6s infinite ease-in-out;}
    @keyframes moonPulse{0%,100%{box-shadow:0 0 25px rgba(180,210,255,.4),0 0 60px rgba(100,160,255,.2)}50%{box-shadow:0 0 40px rgba(180,210,255,.6),0 0 100px rgba(100,160,255,.35)}}
    .stars-bg{position:absolute;inset:0;}
    .star{position:absolute;background:white;border-radius:50%;animation:twinkle var(--d,3s) infinite ease-in-out var(--delay,0s);}
    @keyframes twinkle{0%,100%{opacity:var(--op,.6)}50%{opacity:.1}}
    .tree-line{position:absolute;bottom:0;width:100%;}

    /* NAV */
    nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:1.2rem 3rem;background:linear-gradient(to bottom,rgba(5,8,16,.95),transparent);backdrop-filter:blur(4px);}
    .nav-logo{font-family:'Cinzel Decorative',serif;font-size:1.3rem;letter-spacing:.25em;color:var(--moon);text-shadow:0 0 20px rgba(100,160,255,.5);text-decoration:none;}
    .nav-links{display:flex;gap:2rem;list-style:none;align-items:center;}
    .nav-links a{font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--silver);text-decoration:none;transition:color .3s;}
    .nav-links a:hover{color:var(--moon);}
    .nav-links a.active{color:var(--moon);border-bottom:1px solid var(--accent);padding-bottom:2px;}
    .nav-currency{display:flex;gap:1rem;align-items:center;}
    .nav-curr{font-family:'Cinzel',serif;font-size:.72rem;color:var(--fire3);display:flex;align-items:center;gap:.3rem;}

    /* LAYOUT */
    .page{position:relative;z-index:10;padding:7rem 3rem 4rem;max-width:1400px;margin:0 auto;}

    /* SHOP HEADER */
    .shop-header{text-align:center;margin-bottom:3rem;animation:fadeIn .6s ease both;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .shop-title{font-family:'Cinzel Decorative',serif;font-size:2.2rem;letter-spacing:.3em;color:var(--moon);text-shadow:0 0 30px rgba(180,210,255,.4);margin-bottom:.5rem;}
    .shop-sub{font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.35em;text-transform:uppercase;color:var(--accent);}
    .currency-bar{display:inline-flex;gap:2rem;margin-top:1.5rem;background:rgba(8,13,26,.8);border:1px solid rgba(74,111,165,.25);padding:.8rem 2rem;}
    .curr-display{display:flex;align-items:center;gap:.5rem;}
    .curr-display .icon{font-size:1.2rem;}
    .curr-display .val{font-family:'Cinzel Decorative',serif;font-size:1rem;color:var(--fire3);}
    .curr-display .lbl{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text-dim);}

    /* MAIN GRID */
    .shop-layout{display:grid;grid-template-columns:240px 1fr;gap:2.5rem;align-items:start;}

    /* SIDEBAR CATEGORIES */
    .shop-sidebar{background:linear-gradient(160deg,rgba(8,13,26,.97),rgba(11,18,40,.95));border:1px solid rgba(74,111,165,.25);padding:1.5rem;position:sticky;top:7rem;animation:fadeIn .6s ease .1s both;}
    .shop-sidebar::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(to right,transparent,var(--accent),transparent);}
    .sidebar-title{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.3em;text-transform:uppercase;color:var(--text-dim);margin-bottom:1rem;}
    .cat-btn{display:flex;align-items:center;gap:.8rem;width:100%;background:none;border:1px solid transparent;color:var(--text-dim);font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;padding:.8rem 1rem;cursor:pointer;transition:all .3s;margin-bottom:.3rem;text-align:left;}
    .cat-btn:hover{color:var(--silver);background:rgba(74,111,165,.08);border-color:rgba(74,111,165,.15);}
    .cat-btn.active{color:var(--moon);background:rgba(26,58,110,.3);border-color:rgba(74,111,165,.4);}
    .cat-btn .cat-icon{font-size:1.1rem;width:22px;text-align:center;}
    .cat-btn .cat-count{margin-left:auto;font-size:.6rem;background:rgba(74,111,165,.2);border:1px solid rgba(74,111,165,.25);padding:.1rem .4rem;color:var(--accent);}
    .sidebar-divider{height:1px;background:rgba(74,111,165,.15);margin:1rem 0;}
    .filter-title{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.3em;text-transform:uppercase;color:var(--text-dim);margin-bottom:.7rem;}
    .filter-btn{display:flex;align-items:center;gap:.5rem;width:100%;background:none;border:none;cursor:pointer;padding:.4rem .5rem;font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;transition:color .3s;margin-bottom:.2rem;}
    .rarity-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
    .dot-common{background:var(--silver);}
    .dot-rare{background:var(--rare);}
    .dot-epic{background:var(--epic);}
    .dot-legendary{background:var(--legendary);}
    .filter-btn{color:var(--text-dim);}
    .filter-btn.active,.filter-btn:hover{color:var(--moon);}

    /* ITEMS GRID */
    .shop-main{animation:fadeIn .6s ease .15s both;}
    .section-head{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;}
    .section-title{font-family:'Cinzel Decorative',serif;font-size:1rem;letter-spacing:.2em;color:var(--moon);}
    .section-line{flex:1;height:1px;background:linear-gradient(to right,rgba(74,111,165,.4),transparent);}
    .section-count{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.15em;color:var(--text-dim);}

    .items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1.2rem;margin-bottom:2.5rem;}

    /* ITEM CARD */
    .item-card{background:linear-gradient(160deg,rgba(8,13,26,.97),rgba(11,18,40,.95));border:1px solid rgba(74,111,165,.2);padding:1.5rem 1rem 1rem;text-align:center;position:relative;cursor:pointer;transition:all .3s;overflow:hidden;}
    .item-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:var(--rarity-color,rgba(74,111,165,.4));transition:opacity .3s;}
    .item-card:hover{border-color:rgba(74,111,165,.5);transform:translateY(-3px);box-shadow:0 8px 30px rgba(10,20,50,.6);}
    .item-card.owned{border-color:rgba(74,255,128,.2);}
    .item-card.owned::before{background:rgba(74,255,128,.5);}
    .item-card.equipped{border-color:rgba(245,166,35,.4);}
    .item-card.equipped::before{background:rgba(245,166,35,.7);}

    .rarity-badge{position:absolute;top:.6rem;right:.6rem;font-family:'Cinzel',serif;font-size:.5rem;letter-spacing:.15em;text-transform:uppercase;padding:.15rem .5rem;}
    .badge-common{background:rgba(168,184,208,.1);border:1px solid rgba(168,184,208,.3);color:var(--silver);}
    .badge-rare{background:rgba(168,85,247,.1);border:1px solid rgba(168,85,247,.3);color:#c084fc;}
    .badge-epic{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.3);color:#93c5fd;}
    .badge-legendary{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.35);color:var(--legendary);}

    .item-preview{width:80px;height:80px;border-radius:50%;margin:0 auto 1rem;display:flex;align-items:center;justify-content:center;font-size:2.2rem;position:relative;background:rgba(5,8,16,.7);}
    .item-preview .preview-aura{position:absolute;inset:-4px;border-radius:50%;animation:auraGlow 2.5s infinite ease-in-out;}
    @keyframes auraGlow{0%,100%{opacity:.3}50%{opacity:.8}}
    .aura-preview-blue{background:radial-gradient(circle,transparent 35%,rgba(74,111,165,.6) 65%,transparent 100%);}
    .aura-preview-gold{background:radial-gradient(circle,transparent 35%,rgba(245,166,35,.6) 65%,transparent 100%);}
    .aura-preview-red{background:radial-gradient(circle,transparent 35%,rgba(224,85,85,.6) 65%,transparent 100%);}
    .aura-preview-purple{background:radial-gradient(circle,transparent 35%,rgba(168,85,247,.6) 65%,transparent 100%);}
    .aura-preview-green{background:radial-gradient(circle,transparent 35%,rgba(74,255,128,.5) 65%,transparent 100%);}
    .aura-preview-fire{background:radial-gradient(circle,transparent 35%,rgba(245,100,35,.7) 65%,transparent 100%);}
    .aura-preview-ice{background:radial-gradient(circle,transparent 35%,rgba(147,210,255,.6) 65%,transparent 100%);}
    .aura-preview-void{background:radial-gradient(circle,transparent 35%,rgba(20,0,40,.9) 65%,transparent 100%);}

    .item-name{font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;color:var(--moon);margin-bottom:.3rem;}
    .item-desc{font-size:.7rem;color:var(--text-dim);margin-bottom:.9rem;line-height:1.4;min-height:2.4em;}

    .item-footer{display:flex;align-items:center;justify-content:center;gap:.5rem;}
    .item-price{font-family:'Cinzel',serif;font-size:.8rem;color:var(--fire3);display:flex;align-items:center;gap:.3rem;}
    .price-gold{color:var(--gold);}

    .btn-buy{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.15em;padding:.5rem 1rem;border:none;cursor:pointer;background:linear-gradient(135deg,var(--blue-glow),var(--accent));color:var(--moon);clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);transition:all .3s;}
    .btn-buy:hover{box-shadow:0 0 20px rgba(74,111,165,.5);}
    .btn-buy.btn-equip{background:linear-gradient(135deg,#1a4a1a,#2d7a2d);color:#90ee90;}
    .btn-buy.btn-equip:hover{box-shadow:0 0 20px rgba(74,255,128,.3);}
    .btn-buy.btn-equipped{background:linear-gradient(135deg,#4a3a00,#7a6000);color:var(--gold);cursor:default;}
    .btn-buy.btn-equipped:hover{box-shadow:none;}
    .owned-tag{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--success);padding:.4rem .8rem;border:1px solid rgba(74,255,128,.25);background:rgba(74,255,128,.08);}

    /* CUSTOMIZATION PANEL */
    .custom-panel{background:linear-gradient(160deg,rgba(8,13,26,.97),rgba(11,18,40,.95));border:1px solid rgba(74,111,165,.25);padding:2rem;margin-top:2rem;position:relative;}
    .custom-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(to right,transparent,var(--fire3),transparent);}
    .custom-grid{display:grid;grid-template-columns:200px 1fr;gap:2rem;align-items:start;}
    .custom-preview{text-align:center;}
    .preview-wolf{width:120px;height:120px;border-radius:50%;margin:0 auto 1rem;display:flex;align-items:center;justify-content:center;font-size:4rem;background:rgba(5,8,16,.7);border:2px solid rgba(74,111,165,.3);position:relative;overflow:visible;}
    .preview-wolf .main-aura{position:absolute;inset:-10px;border-radius:50%;animation:auraGlow 2s infinite ease-in-out;pointer-events:none;}
    .preview-lbl{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text-dim);margin-bottom:.5rem;}
    .preview-name{font-family:'Cinzel Decorative',serif;font-size:.85rem;color:var(--moon);}
    .custom-slots{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
    .slot{background:rgba(5,8,16,.6);border:1px solid rgba(74,111,165,.15);padding:1rem;}
    .slot-label{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.25em;text-transform:uppercase;color:var(--accent);margin-bottom:.8rem;}
    .slot-options{display:flex;gap:.5rem;flex-wrap:wrap;}
    .slot-option{width:44px;height:44px;border-radius:50%;border:2px solid rgba(74,111,165,.2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.4rem;background:rgba(10,20,50,.5);transition:all .3s;position:relative;}
    .slot-option:hover{border-color:rgba(74,111,165,.5);transform:scale(1.1);}
    .slot-option.selected{border-color:var(--fire3);box-shadow:0 0 12px rgba(245,166,35,.4);}
    .slot-option .mini-aura{position:absolute;inset:-3px;border-radius:50%;opacity:.5;}
    .btn-save{font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.2em;padding:.9rem 2.5rem;border:none;cursor:pointer;background:linear-gradient(135deg,#4a2a00,var(--fire2));color:var(--moon);clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);transition:all .3s;margin-top:1.2rem;}
    .btn-save:hover{box-shadow:0 0 25px rgba(245,166,35,.4);}
    .save-msg{font-family:'Cinzel',serif;font-size:.7rem;color:var(--success);margin-top:.8rem;text-align:center;height:1.2em;}

    /* TOAST */
    .toast{position:fixed;bottom:2rem;right:2rem;z-index:300;background:linear-gradient(135deg,rgba(8,13,26,.97),rgba(11,18,40,.97));border:1px solid rgba(74,111,165,.3);padding:1rem 1.5rem;font-family:'Cinzel',serif;font-size:.75rem;letter-spacing:.1em;color:var(--moon);display:flex;align-items:center;gap:.8rem;transform:translateX(120%);transition:transform .4s ease;min-width:260px;}
    .toast.show{transform:translateX(0);}
    .toast::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--success);}
    .toast.error::before{background:var(--error);}

    /* SCROLLBAR */
    ::-webkit-scrollbar{width:4px;}
    ::-webkit-scrollbar-track{background:var(--deep);}
    ::-webkit-scrollbar-thumb{background:var(--blue-glow);border-radius:2px;}

    @media(max-width:1000px){.shop-layout{grid-template-columns:1fr;}.shop-sidebar{position:static;}.custom-grid{grid-template-columns:1fr;}}
    @media(max-width:600px){.items-grid{grid-template-columns:repeat(2,1fr);}.custom-slots{grid-template-columns:1fr;}}
  </style>
</head>

    <g fill="#06090f"><polygon points="0,160 40,55 80,160"/><polygon points="180,160 225,40 270,160"/><polygon points="380,160 425,48 470,160"/><polygon points="580,160 625,38 670,160"/><polygon points="780,160 825,45 870,160"/><polygon points="980,160 1025,42 1070,160"/><polygon points="1180,160 1225,50 1270,160"/><polygon points="1370,160 1440,58 1440,160"/></g>

</div>

<div class="page">

    </div>

</div>

<script>
const SURL='https://sicyjahkxijkxrxtmjhl.supabase.co';
const SKEY='sb_publishable_5s9soZN5O0Mp4nuWHlXXYA_Xv979vZj';
const db=supabase.createClient(SURL,SKEY);

// Stars
const sc=document.getElementById('stars');
for(let i=0;i<100;i++){const s=document.createElement('div');s.className='star';const sz=Math.random()*2+.5;s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*80}%;left:${Math.random()*100}%;--op:${Math.random()*.5+.3};--d:${Math.random()*4+2}s;--delay:${Math.random()*4}s`;sc.appendChild(s);}

// SHOP DATA

let player={coins:150,gold:320};
let loadout={skin:'skin_classic',aura:'aura_blue',effet:null,avatar:'avatar_wolf'};
let currentCat='all',currentRarity='all';

const RARITY_LABEL={common:'Commun',rare:'Rare',epic:'Épique',legendary:'Légendaire'};
const CURRENCY_ICON={coins:'🪙',gold:'✨'};

async function loadPlayerData(){
  const u=JSON.parse(localStorage.getItem('lycan_user')||'null');
  if(!u){window.location.href='login.html';return;}
  playerId=u.id;
  try{
    const{data}=await db.from('players').select('*').eq('id',u.id).single();
    if(data){
      player.coins=data.coins||0;
      player.gold=data.gold||0;
      (data.owned_items||[]).forEach(id=>{const it=ITEMS.find(x=>x.id===id);if(it)it.owned=true;});
      if(data.loadout)loadout={...loadout,...data.loadout};
      localStorage.setItem('lycan_user',JSON.stringify(data));
    }
  }catch(e){
    player.coins=u.coins||0;player.gold=u.gold||0;
    if(u.owned_items)u.owned_items.forEach(id=>{const it=ITEMS.find(x=>x.id===id);if(it)it.owned=true;});
    if(u.loadout)loadout={...loadout,...u.loadout};
  }
  document.getElementById('coinsDisplay').textContent=player.coins;
  document.getElementById('goldDisplay').textContent=player.gold;
  document.getElementById('navCoins').textContent=player.coins;
  document.getElementById('navGold').textContent=player.gold;
}

function filterCat(cat){
  currentCat=cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  const el=document.getElementById('cat-'+cat);if(el)el.classList.add('active');
  renderItems();
}

function filterRarity(r){
  currentRarity=r;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  event.currentTarget.classList.add('active');
  renderItems();
}

function getFiltered(){
  return ITEMS.filter(it=>{
    const catOk=currentCat==='all'||(currentCat==='owned'?it.owned:it.cat===currentCat);
    const rarOk=currentRarity==='all'||it.rarity===currentRarity;
    return catOk&&rarOk;
  });
}

function renderItems(){
  const list=getFiltered();
  const grid=document.getElementById('itemsGrid');
  const titles={all:'Tous les objets',aura:'Auras',skin:'Skins Loup',effet:'Effets',avatar:'Avatars',owned:'Mes objets'};
  document.getElementById('sectionTitle').textContent=titles[currentCat]||'Objets';
  document.getElementById('sectionCount').textContent=list.length+' objet'+(list.length>1?'s':'');

  if(!list.length){grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:3rem;font-family:\'Cinzel\',serif;font-size:.75rem;letter-spacing:.15em;color:var(--text-dim);">Aucun objet dans cette catégorie</div>';return;}

  grid.innerHTML=list.map(it=>{
    const isEquipped=Object.values(loadout).includes(it.id);
    const priceHtml=it.price===0?'<span style="color:var(--success);font-family:\'Cinzel\',serif;font-size:.7rem;">Gratuit</span>':`<span class="item-price ${it.currency==='gold'?'price-gold':''}">${CURRENCY_ICON[it.currency]} ${it.price}</span>`;
    const btnHtml=it.owned
      ?(isEquipped?`<button class="btn-buy btn-equipped">✓ Équipé</button>`:`<button class="btn-buy btn-equip" onclick="equipItem('${it.id}',event)">Équiper</button>`)
      :`<button class="btn-buy" onclick="buyItem('${it.id}',event)">Acheter</button>`;
    return `<div class="item-card ${it.owned?'owned':''} ${isEquipped?'equipped':''}" data-id="${it.id}">
      <div class="rarity-badge badge-${it.rarity}">${RARITY_LABEL[it.rarity]}</div>
      <div class="item-preview">
        ${it.auraClass?`<div class="preview-aura ${it.auraClass}"></div>`:''}
        ${it.emoji}
      </div>
      <div class="item-name">${it.name}</div>
      <div class="item-desc">${it.desc}</div>
      <div class="item-footer">${priceHtml}${btnHtml}</div>
    </div>`;
  }).join('');
  renderCustomSlots();
}

async function buyItem(id,e){
  e.stopPropagation();
  const it=ITEMS.find(x=>x.id===id);if(!it||it.owned)return;
  if(it.currency==='coins'&&player.coins<it.price){showToast('error','🪙 Coins insuffisants !');return;}
  if(it.currency==='gold'&&player.gold<it.price){showToast('error','✨ Gold insuffisant !');return;}
  if(it.currency==='coins')player.coins-=it.price;
  else player.gold-=it.price;
  it.owned=true;
  // Mettre à jour l'affichage immédiatement
  document.getElementById('coinsDisplay').textContent=player.coins;
  document.getElementById('goldDisplay').textContent=player.gold;
  document.getElementById('navCoins').textContent=player.coins;
  document.getElementById('navGold').textContent=player.gold;
  // Récupérer la liste actuelle des objets possédés depuis Supabase
  try{
    const{data:current}=await db.from('players').select('owned_items').eq('id',playerId).single();
    const owned=[...((current&&current.owned_items)||[])];
    if(!owned.includes(id))owned.push(id);
    await db.from('players').update({
      coins:player.coins,
      gold:player.gold,
      owned_items:owned
    }).eq('id',playerId);
    // Sync localStorage
    const u=JSON.parse(localStorage.getItem('lycan_user')||'{}');
    u.coins=player.coins;u.gold=player.gold;u.owned_items=owned;
    localStorage.setItem('lycan_user',JSON.stringify(u));
    showToast('success','✓ '+it.name+' débloqué !');
  }catch(err){
    // Fallback localStorage si offline
    const u=JSON.parse(localStorage.getItem('lycan_user')||'{}');
    u.coins=player.coins;u.gold=player.gold;
    if(!u.owned_items)u.owned_items=[];
    u.owned_items.push(id);
    localStorage.setItem('lycan_user',JSON.stringify(u));
    showToast('success','✓ '+it.name+' débloqué (hors ligne) !');
  }
  renderItems();
}

function equipItem(id,e){
  if(e)e.stopPropagation();
  const it=ITEMS.find(x=>x.id===id);if(!it||!it.owned)return;
  loadout[it.cat]=id;
  updatePreview();
  renderItems();
  renderCustomSlots();
}

function updatePreview(){
  const skin=ITEMS.find(x=>x.id===loadout.skin);
  const aura=ITEMS.find(x=>x.id===loadout.aura);
  document.getElementById('previewEmoji').textContent=skin?skin.emoji:'🐺';
  document.getElementById('previewName').textContent=skin?skin.name:'Loup Classique';
  const auraEl=document.getElementById('previewAuraEl');
  auraEl.className='main-aura '+(aura&&aura.auraClass?aura.auraClass:'aura-preview-blue');
}

function renderCustomSlots(){
  const slotMap={skin:'slotSkins',aura:'slotAuras',effet:'slotEffets',avatar:'slotAvatars'};
  Object.entries(slotMap).forEach(([cat,slotId])=>{
    const el=document.getElementById(slotId);
    const owned=ITEMS.filter(x=>x.cat===cat&&x.owned);
    if(!owned.length){el.innerHTML='<span style="font-family:\'Cinzel\',serif;font-size:.6rem;color:var(--text-dim)">Aucun</span>';return;}
    el.innerHTML=owned.map(it=>`<div class="slot-option ${loadout[cat]===it.id?'selected':''}" onclick="equipItem('${it.id}')" title="${it.name}">
      ${it.auraClass?`<div class="mini-aura ${it.auraClass}"></div>`:''}${it.emoji}
    </div>`).join('');
  });
  updatePreview();
}

async function saveLoadout(){
  const msg=document.getElementById('saveMsg');
  msg.textContent='Sauvegarde...';
  try{
    await db.from('players').update({loadout:loadout}).eq('id',playerId);
    const u=JSON.parse(localStorage.getItem('lycan_user')||'{}');
    u.loadout=loadout;
    localStorage.setItem('lycan_user',JSON.stringify(u));
    msg.textContent='✓ Équipement sauvegardé !';
  }catch(e){
    const u=JSON.parse(localStorage.getItem('lycan_user')||'{}');
    u.loadout=loadout;
    localStorage.setItem('lycan_user',JSON.stringify(u));
    msg.textContent='✓ Sauvegardé (hors ligne)';
  }
  setTimeout(()=>msg.textContent='',2500);
}

function showToast(type,msg){
  const t=document.getElementById('toast');
  t.className='toast '+(type==='error'?'error':'');
  document.getElementById('toastMsg').textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

// INIT
let playerId=null;
loadPlayerData();
</script>
